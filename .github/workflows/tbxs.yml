name: Sync GitHub Repos to Subfolders and unzip to master

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: sync_job_lock
  cancel-in-progress: true

jobs:
  sync_and_unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v3

      - name: Set up Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset local repo to remote default branch
        run: |
          set -e
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          echo "Detected default branch: $DEFAULT_BRANCH"
          git fetch origin $DEFAULT_BRANCH
          git checkout $DEFAULT_BRANCH || git checkout -b $DEFAULT_BRANCH
          git reset --hard origin/$DEFAULT_BRANCH
          git clean -fdx
          echo "✅ Reset 完成"

      - name: Fetch subprojects
        run: |
          echo "==== 开始同步 Git 仓库 ===="
          declare -A repos=(
            [dr]="https://github.com/jak0099/dr.git"
            [tvbox]="https://github.com/cluntop/tvbox.git"
            [T4]="https://github.com/4TVBox/TVBox.git"
            [wzxxcz]="https://github.com/wzxxcz/wzxxcz.git"
            [Tomorrow]="https://github.com/tushen6/Tomorrow.git"
            [aa999ok]="https://github.com/AA999OK/TVBOX.git"
            [sky4726]="https://github.com/sky4726/sk.git"
            [ediart]="https://github.com/ediart/tvbox.git"
            [lemonguo121]="https://github.com/lemonguo121/BoxRes.git"
            [leexuben]="https://github.com/leexuben/TVBOX-merge.git"
            [yjl]="https://github.com/YJL20190405/TVBOX.git"
            [zheng1976]="https://github.com/zheng197600/tvbox.git"
            [FGBLH]="https://github.com/FGBLH/FG.git"
            [yihad168]="https://github.com/yihad168/tv.git"
            [cpu_iy]="https://gitee.com/cpu-iy/iy.git"
            [reF1nd]="https://github.com/syccccc2333-oss/singbox_config.git"
            [bd]="https://github.com/xiaohaozifeifeifei/bd.git"
          )

          for name in "${!repos[@]}"; do
            echo "→ 同步 $name"
            rm -rf "$name" temp-"$name"
            git clone --depth 1 "${repos[$name]}" temp-"$name"
            mkdir -p "$name"
            cp -r temp-"$name"/* "$name"/
            rm -rf temp-"$name"
          done
          echo "==== 多仓库同步完成 ===="

      - name: Sync DustinWin _posts
        run: |
          echo "==== 开始同步 DustinWin _posts 目录 ===="
          rm -rf temp-dustinwin
          git clone --depth 1 https://github.com/DustinWin/dustinwin.github.io.git temp-dustinwin
          mkdir -p _posts
          cp -r temp-dustinwin/_posts/* _posts/
          rm -rf temp-dustinwin
          echo "✅ DustinWin _posts 同步完成"

      - name: Update file timestamps
        run: |
          find dr tvbox T4 wzxxcz Tomorrow aa999ok sky4726 ediart lemonguo121 leexuben yjl zheng1976 FGBLH yihad168 cpu_iy reF1nd bd _posts \
            -type f -exec touch {} +

      - name: Download and extract NewTVBox
        run: |
          echo "==== 开始下载 PizazzGY/NewTVBox ===="
          rm -rf gitee-source
          mkdir -p gitee-source
          curl -L -o github.zip "https://github.com/PizazzGY/NewTVBox/archive/refs/heads/main.zip"

          if unzip -t github.zip >/dev/null 2>&1; then
            unzip -q github.zip
            cp -r NewTVBox-main/* gitee-source/
            rm -rf NewTVBox-main github.zip
            echo "✅ NewTVBox 下载解压完成"
          else
            echo "❌ ZIP 文件无效，跳过"
            rm -f github.zip
          fi

      - name: Commit and push to default branch
        run: |
          git add .
          git commit -m "Sync all projects, DustinWin posts, and NewTVBox" || echo "No changes to commit"
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          git push origin $DEFAULT_BRANCH

      - name: Sync to master branch
        run: |
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/master; then
            git checkout master
          else
            git checkout -b master
          fi
          git reset --hard origin/$DEFAULT_BRANCH
          git push origin master --force

      - name: Unzip all ZIP files in gitee-source (keep ZIP)
        run: |
          if [ -d "gitee-source" ]; then
            cd gitee-source
            for file in *.zip; do
              [ -e "$file" ] || continue
              unzip -o "$file"
            done
            cd ..
          fi

      - name: Commit and force push unzip content to master
        run: |
          git add .
          git commit -m "Unzip all ZIP files in gitee-source (keeping originals)" || echo "No changes"
          git push origin master --force

  cleanup_runs:
    runs-on: ubuntu-latest
    needs: sync_and_unzip
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 3
          keep_minimum_runs: 10
